# ============================================
# LLaDA 8B Stage 3 Configuration (FAST VERSION)
# MolPO Fine-tuning (LoRA + Q-Former + Graph Encoder)
#
# 🚀 속도 최적화 버전:
#   - Flash Attention 2 활성화
#   - Batch Size 4배 증가
#   - num_workers 증가
#   - 예상 속도: 3-4배 향상 (68시간 → 17-23시간)
# ============================================

# ============================================
# [필수] Global Options
# ============================================
debug: true                 # true: 디버그 출력 활성화 | false: 비활성화

# ============================================
# [필수] Stage 식별자
# ============================================
# Stage 1: Text-only LLM 학습 (Q-Former 없이)
# Stage 2: Q-Former만 학습 (GNN, LLM frozen)
# Stage 3: Full multi-modal 학습 (LoRA + Q-Former + Graph Encoder trainable)
llava_pretraining: 0          # ⬅️ Stage 3: 0 (LoRA trainable)
train_molpo: true             # ⬅️ Stage 3: MolPO 활성화
eval_molpo: false             # MolPO 평가 모드 | true/false
second_stage_start_epoch: 0   # ⬅️ Stage 3: 0 (처음부터 모두 trainable)

# ============================================
# [필수] Hardware 설정
# ============================================
strategy_name: null           # null: auto | "ddp" | "fsdp" | "deepspeed_stage_2"
accelerator: gpu              # "gpu" | "cpu" | "tpu"
devices: "0,1,2,3,4,5,6,7"    # 사용할 GPU 인덱스
precision: bf16-mixed         # "bf16-mixed" (권장) | "16-mixed" | "32"
num_workers: 0                # DataLoader workers (0: 안정성 우선)
find_unused_parameters: true  # ⬅️ Stage 3: true (MolPO용 DDP)

# ============================================
# [필수] 모델 아키텍처
# ============================================
llm_model: "GSAI-ML/LLaDA-8B-Instruct"  # LLaDA-8B-Base | LLaDA-8B-Instruct
tune_llm: lora                # "lora": LoRA 학습 | "full": Full FT | "freeze": 동결
tune_gnn: true                # ⬅️ Stage 3: true (Graph Encoder trainable)
mol_representation: string+graph  # ⬅️ Stage 3: "string+graph" (Graph 사용)
load_in_8bit: false           # 8bit 양자화 로드
# use_flash_attention: true   # ❌ LLaDA 모델은 Flash Attention 미지원

# ============================================
# [필수] LoRA 설정
# ============================================
peft_config: "Mol-LLM_Custom/lora_config_llada.json"
peft_dir: ""                  # Stage 2 체크포인트에 포함됨
lora_r: 64
lora_alpha: 32
lora_dropout: 0.1

# ============================================
# [필수] Q-Former Projector 설정
# ============================================
projector_type: qformer       # ⬅️ "qformer" 필수
num_query_token: 32           # Q-Former query 토큰 수: 32 (논문 권장)
bert_name: scibert            # "scibert" | "bert-base-uncased"
bert_hidden_dim: 768          # BERT hidden dimension
cross_attention_freq: 2       # Cross-attention 빈도: 1 | 2 | 4
bert_num_hidden_layers: 5     # Q-Former layer 수: 3 | 5 | 8

# ============================================
# [필수] 토크나이저
# ============================================
add_selfies_tokens: true
selfies_token_path: Mol-LLM_Custom/model/selfies_dict.txt
prompt: "[START_I_SMILES]{}[END_I_SMILES]"

# ============================================
# [필수] 학습 설정
# ============================================
max_steps: -1
max_epochs: 6                 # ⬅️ Stage 3: 6 epochs (논문 권장)
every_n_epochs: 1
task: null
num_beams: 1
skip_sanity_check: true       # ⬅️ true 권장
num_sanity_val_steps: 0

# Batch Size 설정 (🚀 속도 최적화)
# effective_batch_size = batch_size * num_devices * accumulate_grad_batches
# 원본: 1 × 8 × 10 = 80
# Fast: 4 × 8 × 2 = 64 (약간 감소했지만 속도 3-4배 향상)
batch_size: 4                 # 🚀 1 → 4 (4배 증가)
total_batch_size: 80          # ⬅️ Stage 3: 1024 (논문 권장)
accumulate_grad_batches: 2    # 🚀 10 → 2 (조정)

# ============================================
# Optimizer 및 Learning Rate 설정
# ============================================
# Stage 3에서 학습되는 파라미터:
#   1. LoRA adapters
#   2. Q-Former (Qformer.*)
#   3. Graph Encoder (GINE + TokenGT)
#   4. query_tokens
#   5. opt_proj (Linear projection)
#   6. ln_graph (LayerNorm)
#
# Frozen 파라미터:
#   - LLM base model (non-LoRA weights)
# ============================================
optimizer: adamw
weight_decay: 0.1
gradient_clip_val: 1.0
log_every_n_steps: 50         # 🚀 10 → 50 (로깅 오버헤드 감소)

# WSD Scheduler 설정
scheduler: warmup_stable_decay_lr
warmup_steps: 100             # ⬅️ Stage 3: 100 steps warmup
warmup_lr: 0.0
decay_ratio: 0.1
min_lr_ratio: 0.1

# Learning Rate (논문 권장)
init_lr: 0.00004              # ⬅️ Stage 3: 4e-5 (논문 권장)
min_lr: 0.00002               # ⬅️ Stage 3: 2e-5
# DPO Leraning Rate


original_vocab_size: 126349

# ============================================
# [필수] LLaDA 전용 설정
# ============================================
remasking_strategy: 'low_confidence'  # 'low_confidence' | 'random' | 'none'
sampling_steps: 32            # ⬅️ Inference 시 사용

use_semi_ar: false
semi_ar_block_size: 32
semi_ar_steps_per_block: 4

val_strategies: ["semi_ar"]                    # 🚀 Semi-AR만 (captioning/generation 성능 측정)

# ============================================
# [필수] 데이터
# ============================================
truncation: 1
padding: max_length
max_length: 512
inference_max_length: 512
gen_max_len: 256
min_len: 8
inference_batch_size: 4       # 추론 batch size (MolPO 더블링으로 실제 8, OOM 방지)

apply_sequence_packing: false
max_packing_size: -1

selfies_enumeration: false
isomericSmiles: false
canonical: false
allHsExplicit: false
cal_average_generation_loss: false
# ============================================
# [필수] 로깅 및 체크포인트
# ============================================
logging_dir: Mol-LLM_Custom/checkpoint/LLaDA_Stage3  # ⬅️ Stage 3 디렉토리
filename: llada_stage3_molpo                          # ⬅️ Stage 3 파일명

save_on_n_steps: 5000
save_top_k_checkpoints: -1
save_top_k_best: 3
save_every_n_epochs: 1

val_check_interval: 1.0
check_val_every_n_epoch: 2    # 🚀 1 → 2 (매 2 epoch마다 검증)
test_on_trainset: false
limit_val_batches: 0.1        # 🚀 1.0 → 0.1 (10% 샘플만 검증)

eval_modality_util: null

# ============================================
# Weight Norm Logging
# ============================================
# Stage 3: LoRA, Graph Encoder, Q-Former 추적
log_weight_norm_layers: ["wte", "ff_out", "gnn", "Qformer", "lora"]  # ⬅️ Stage 3: 3개 모두 추적
log_weight_norm_interval: 10

top_selfies_tokens: []        # Stage 3에서는 Embedding 학습 안 함

# ============================================
# Debug Logging (🚀 최적화)
# ============================================
log_embedding_status: false   # 🚀 true → false (로깅 오버헤드 감소)
embedding_log_interval: 100
log_model_init_details: false # 🚀 true → false
log_nan_details: true
nan_log_dir: './nan_logs'

log_stepwise_denoising: false
stepwise_log_dir: '/app/stepwise_logs'
stepwise_max_samples: '8'

# ============================================
# MolPO Preference Optimization 설정 (Stage 3 핵심!)
# ============================================
# 2: 배치가 chosen/rejected 두 그룹으로 나뉨 (DPO 스타일 학습)
# 3: 배치가 sft/chosen/rejected 세 그룹으로 나뉨 (SFT + DPO 동시 학습)
molpo_batch_division: 2       # ⬅️ 2: (chosen, rejected) pair

# Loss Weights (논문 Table 7b)
sft_weight: 1.0               # ⬅️ SFT loss 가중치
molpo_weight: 0.25             # ⬅️ MolPO loss 가중치 (c=0.25, 논문 권장)

# MolPO Hyperparameters (논문 기준)
beta: 1.0                     # ⬅️ Temperature (logit scaling)
gamma_beta_ratio: 0.5         # ⬅️ γ/β 비율

# ============================================
# Task-Adaptive Margin
# ============================================
# 논문 공식: γ_i = λ_margin × |E[r_w,i]|
# λ_margin (molpo_lambda): margin scaling coefficient
#   - 논문 권장값: 0.5 (Appendix B.5)
#   - 높을수록 task별 reward 차이에 민감
#   - 0.0: margin 무시 (고정 margin 사용)
molpo_lambda: 0.5             # ⬅️ [FIX] 양수로 변경 (이전: -0.5)

# Margin Clipping Threshold
# 논문 공식: min(r_w - r_ℓ, λ_clip × |r_w|)
# λ_clip (margin_clip_scale): clipping threshold
#   - 논문 권장값: 1.0 (Appendix B.5)
#   - rejected reward가 과도하게 낮아지는 것 방지
margin_clip_scale: 1.0        # ⬅️ Margin clipping threshold (λclip)

# Optional MolPO Parameters
anc_rejected_weight: 0.0      # Anchor loss weight (사용 안 함)
loss_type: sigmoid            # MolPO loss 함수 타입
anc_loss_type: sigmoid        # Anchor loss 함수 타입
reject_label_mask: false      # [Deprecated] Rejected label masking (논문과 불일치)
anc_reject_clip: -1           # Anchor clipping threshold
rejected_lambda: 1.5
apply_preference_system_prompt: false

# ============================================
# [Optional] MolPO Labels Filtering
# ============================================
# exclude_mol_tokens: <mol> 토큰을 loss 계산에서 제외
#   - true: graph representation 토큰 제외
#   - false: 모든 토큰 포함 (논문 권장)
exclude_mol_tokens: false     # 논문과 일치
# ============================================
# [필수] Stage 2 체크포인트 로드
# ============================================
# Stage 2에서 학습된 Q-Former와 Graph Encoder를 로드합니다.
pretrained_ckpt_path: "Mol-LLM_Custom/checkpoint/LLaDA_Stage2/stage1_HPC_total_240steps_stage2/last.ckpt"

# ============================================
# [주의] 반드시 False로 설정
# ============================================
log_attn_score: false         # ⚠️ LLaDA는 Attention logging 미지원
